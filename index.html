<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Digital Twin · Neural Ops v6</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ─────────────────────────────────────────────────
   SECTION 1: CSS VARIABLES & RESET
───────────────────────────────────────────────── */
:root {
  --bg:       #080808;
  --bg2:      #0c0c0c;
  --surface:  #101010;
  --surface2: #141414;
  --surface3: #1a1a1a;
  --border:   rgba(255,255,255,0.045);
  --border2:  rgba(255,255,255,0.08);
  --border3:  rgba(255,255,255,0.14);
  --accent:   #f97316;
  --accent-d: rgba(249,115,22,0.08);
  --accent-g: rgba(249,115,22,0.20);
  --accent-b: #7c3a10;
  --purple:   #a855f7;
  --purple-d: rgba(168,85,247,0.08);
  --cyan:     #22d3ee;
  --cyan-d:   rgba(34,211,238,0.07);
  --danger:   #ef4444;
  --danger-d: rgba(239,68,68,0.08);
  --green:    #22c55e;
  --text:     #e4e4e4;
  --text2:    #b0b0b0;
  --muted:    #2a2a2a;
  --muted2:   #666;
  --muted3:   #888;
  --serif:    'Playfair Display', Georgia, serif;
  --sans:     'Inter', system-ui, sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --sb:       244px;
  --top:      44px;
  --r:        2px;
  --trans:    all 0.15s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.18);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
:focus-visible{outline:2px solid rgba(249,115,22,0.5);outline-offset:2px}

/* ─────────────────────────────────────────────────
   SECTION 2: GATE (Login Screen)
───────────────────────────────────────────────── */
#driveGate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
#driveGate.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.gate-inner{width:440px;max-width:calc(100vw - 32px);border:1px solid var(--border2);border-top:2px solid var(--accent);padding:36px;background:var(--surface);animation:slideUp 0.35s cubic-bezier(0.34,1.1,0.64,1);box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(249,115,22,0.05)}
.gate-logo{display:flex;align-items:center;gap:13px;margin-bottom:32px}
.gate-mark{width:36px;height:36px;background:var(--accent);display:flex;align-items:center;justify-content:center;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0}
.gate-name{font-family:var(--serif);font-size:21px;font-style:italic}
.gate-sub{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}
.gate-field{margin-bottom:14px}
.gate-label{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.gate-label-req{color:var(--accent);font-size:10px}
.gate-input{width:100%;background:var(--bg);border:1px solid var(--border2);padding:10px 13px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:var(--trans);caret-color:var(--accent);border-radius:var(--r)}
.gate-input:focus{border-color:rgba(249,115,22,0.45);box-shadow:0 0 0 3px rgba(249,115,22,0.06)}
.gate-input.error{border-color:rgba(239,68,68,0.5)}
.gate-hint{font-family:var(--mono);font-size:10px;color:var(--muted3);line-height:1.85;margin-bottom:22px;padding:10px 12px;background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.1);border-left:2px solid var(--cyan)}
.gate-hint strong{color:var(--cyan)}
.gate-btn{width:100%;padding:12px;background:var(--accent);border:none;color:#080808;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:var(--trans);border-radius:var(--r);clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px))}
.gate-btn:hover:not(:disabled){background:#fb923c;transform:translateY(-1px)}
.gate-btn:disabled{opacity:0.35;cursor:not-allowed}
.gate-status{font-family:var(--mono);font-size:10px;color:var(--muted3);margin-top:10px;text-align:center;min-height:16px;transition:color 0.2s}
.gate-status.err{color:var(--danger)}
.gate-status.ok{color:var(--green)}

/* ─────────────────────────────────────────────────
   SECTION 3: APP LOADER
───────────────────────────────────────────────── */
#appLoader{position:fixed;inset:0;background:var(--bg);z-index:998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#appLoader.hidden{display:none}
.loader-ring{width:28px;height:28px;position:relative}
.loader-ring::before,.loader-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.loader-ring::before{border-top-color:var(--accent);animation:spin 0.75s linear infinite}
.loader-ring::after{border-bottom-color:rgba(249,115,22,0.2);animation:spin 1.5s linear infinite reverse}
.loader-txt{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.2em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─────────────────────────────────────────────────
   SECTION 4: APP SHELL LAYOUT
───────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:var(--sb) 1fr;grid-template-rows:var(--top) 1fr;height:100vh;transition:grid-template-columns 0.22s cubic-bezier(0.4,0,0.2,1)}
.app.collapsed{--sb:0px}

/* ─────────────────────────────────────────────────
   SECTION 5: TOPBAR
───────────────────────────────────────────────── */
.topbar{grid-column:1/-1;display:flex;align-items:center;background:rgba(8,8,8,0.98);border-bottom:1px solid var(--border2);position:relative;z-index:50;backdrop-filter:blur(8px)}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 3%,var(--accent) 25%,rgba(249,115,22,0.25) 70%,transparent 97%);opacity:0.35;pointer-events:none}
.tb-l{display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;border-right:1px solid var(--border);height:100%}
.sb-toggle{background:transparent;border:1px solid var(--border2);color:var(--muted3);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;transition:var(--trans);flex-shrink:0;border-radius:var(--r)}
.sb-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.logo{display:flex;align-items:center;gap:9px;user-select:none;cursor:pointer}
.logo-mark{width:28px;height:28px;background:var(--accent);display:flex;align-items:center;justify-content:center;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0;transition:var(--trans)}
.logo:hover .logo-mark{background:#fb923c}
.logo-name{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--text)}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--muted3);letter-spacing:0.2em;text-transform:uppercase;margin-top:1px}
.pill{font-family:var(--mono);font-size:10px;padding:2px 8px;letter-spacing:0.06em;border-radius:100px}
.pill-live{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.22)}
.pill-live::before{content:'●';margin-right:4px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.pill-model{background:var(--surface2);color:var(--muted3);border:1px solid var(--border2)}
.status-bar{flex:1;display:flex;align-items:center;height:100%;border-right:1px solid var(--border);padding:0 14px;gap:0;overflow:hidden}
.sbar-item{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.05em;white-space:nowrap;padding:0 11px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:5px}
.sbar-item:last-child{border:none}
.sbar-val{color:var(--text2)}
.sbar-mode-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 9px;letter-spacing:0.1em;border:1px solid rgba(249,115,22,0.28);background:var(--accent-d);color:var(--accent);border-radius:100px}
.sbar-web-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 9px;letter-spacing:0.1em;border:1px solid rgba(34,211,238,0.28);background:var(--cyan-d);color:var(--cyan);border-radius:100px;display:inline-flex;align-items:center;gap:5px}
.sbar-web-badge::before{content:'';width:5px;height:5px;background:var(--cyan);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.kb-hint{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.03em;display:flex;align-items:center;gap:7px;padding:0 11px;flex-shrink:0;border-right:1px solid var(--border);height:100%}
.kb{background:var(--surface2);border:1px solid var(--border2);padding:1px 6px;color:var(--muted3);font-size:9px;border-radius:3px}
.tb-r{display:flex;align-items:center;font-family:var(--mono);font-size:10px;color:var(--muted3);flex-shrink:0;height:100%}
.tb-stat{display:flex;align-items:center;gap:5px;padding:0 11px;border-left:1px solid var(--border);height:100%;cursor:default}
.tb-stat-label{letter-spacing:0.1em;text-transform:uppercase;font-size:10px;color:var(--muted3)}
.tb-stat-val{color:var(--accent);font-weight:600;font-size:12px;transition:color 0.2s}
.drive-indicator{display:flex;align-items:center;gap:5px;padding:0 12px;border-left:1px solid var(--border);height:100%;font-family:var(--mono);font-size:10px;color:var(--muted3);cursor:pointer;transition:color 0.15s}
.drive-indicator:hover{color:var(--text)}
.drive-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:background 0.4s}
.drive-dot.synced{background:var(--green)}
.drive-dot.syncing{background:var(--accent);animation:pulse 0.9s ease-in-out infinite}
.drive-dot.err{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:0.35;transform:scale(0.85)}50%{opacity:1;transform:scale(1)}}
#clock{padding:0 12px;border-left:1px solid var(--border);height:100%;display:flex;align-items:center;color:var(--muted3);letter-spacing:0.1em;font-size:10px;font-family:var(--mono)}

/* ─────────────────────────────────────────────────
   SECTION 6: SIDEBAR
───────────────────────────────────────────────── */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:rgba(8,8,8,0.95)}
.sb-inner{min-width:244px;height:100%;display:flex;flex-direction:column}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 5px 0}
.sb-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted2);padding:0 8px;margin:14px 0 2px;display:flex;align-items:center;gap:8px}
.sb-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-label:first-child{margin-top:6px}
.nav{display:flex;align-items:center;gap:8px;padding:7px 10px;font-family:var(--sans);font-size:12px;color:var(--muted3);cursor:pointer;border:1px solid transparent;border-left:2px solid transparent;transition:var(--trans);user-select:none;margin-bottom:1px;border-radius:0 var(--r) var(--r) 0}
.nav:hover{background:var(--accent-d);color:var(--text);border-left-color:rgba(249,115,22,0.3)}
.nav.active{background:var(--accent-d);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:0.35;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s}
.nav:hover .nav-icon,.nav.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--accent-d);color:var(--accent);border:1px solid rgba(249,115,22,0.2);padding:1px 7px;letter-spacing:0.04em;border-radius:100px;min-width:22px;text-align:center;transition:var(--trans)}
.nav-badge.p{background:var(--purple-d);color:var(--purple);border-color:rgba(168,85,247,0.25)}
.nav-badge.c{background:var(--cyan-d);color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.sb-footer{border-top:1px solid var(--border);padding:9px 8px 11px}
.sf-label{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-family:var(--mono);font-size:9px;padding:2px 7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted3);white-space:nowrap;transition:var(--trans);letter-spacing:0.03em;cursor:default;border-radius:100px}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.chip.book-chip{border-color:rgba(34,211,238,0.2);color:var(--cyan);background:var(--cyan-d)}

/* ─────────────────────────────────────────────────
   SECTION 7: MAIN / PANELS
───────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative}
.panel{display:none;flex-direction:column;height:calc(100vh - var(--top))}
.panel.active{display:flex}
.panel.panel-enter{animation:panelIn 0.2s cubic-bezier(0.4,0,0.2,1)}
@keyframes panelIn{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:none}}

/* ─────────────────────────────────────────────────
   SECTION 8: CHAT HEADER & MODES
───────────────────────────────────────────────── */
.chat-header{padding:7px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;background:rgba(8,8,8,0.7);backdrop-filter:blur(4px)}
.mode-tabs{display:flex;gap:1px}
.mtab{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.01em;padding:5px 12px;border:1px solid transparent;border-bottom:2px solid transparent;background:transparent;color:var(--muted3);cursor:pointer;transition:var(--trans);position:relative;border-radius:var(--r) var(--r) 0 0}
.mtab:hover{color:var(--text);background:var(--surface2)}
.mtab .key-num{font-family:var(--mono);font-size:9px;color:var(--muted3);position:absolute;top:3px;right:3px;opacity:0}
.mtab:hover .key-num{opacity:0.6}
.mtab.active .key-num{opacity:0.5}
.mtab.active{color:var(--accent);background:var(--accent-d);border-bottom-color:var(--accent)}
.mtab.mode-brainstorm.active{color:var(--purple);background:var(--purple-d);border-bottom-color:var(--purple)}
.mode-pipe{width:1px;height:18px;background:var(--border2);margin:0 2px;align-self:center}
.mode-desc-badge{font-family:var(--sans);font-size:12px;font-style:italic;color:var(--muted3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;gap:5px;flex-shrink:0;margin-left:auto}
.hdr-btn{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.06em;padding:4px 11px;border:1px solid var(--border2);background:transparent;color:var(--muted3);cursor:pointer;transition:var(--trans);white-space:nowrap;text-transform:uppercase;border-radius:var(--r)}
.hdr-btn:hover{border-color:var(--border3);color:var(--text)}
.hdr-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-d)}
.hdr-btn.export:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-d)}

/* Web search toggle button */
.web-toggle{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.06em;padding:4px 11px;border:1px solid var(--border2);background:transparent;color:var(--muted3);cursor:pointer;transition:var(--trans);white-space:nowrap;border-radius:100px}
.web-toggle:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-d)}
.web-toggle.active{border-color:rgba(34,211,238,0.45);color:var(--cyan);background:var(--cyan-d)}
.web-toggle-dot{width:6px;height:6px;border-radius:50%;background:var(--muted3);transition:background 0.2s}
.web-toggle.active .web-toggle-dot{background:var(--cyan);animation:pulse 1.4s ease-in-out infinite}

/* ─────────────────────────────────────────────────
   SECTION 9: MESSAGES
───────────────────────────────────────────────── */
.messages{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.mgroup{display:flex;flex-direction:column;gap:4px}
.mgroup.user{align-items:flex-end}
.mgroup.twin{align-items:flex-start}
.mlabel{font-family:var(--mono);font-size:10px;color:var(--muted3);padding:0 4px;letter-spacing:0.14em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.msg-meta{font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.04em}
.bubble{max-width:76%;padding:12px 16px;font-size:13px;line-height:1.78;position:relative;animation:bubbleIn 0.22s cubic-bezier(0.34,1.2,0.64,1)}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}
.mgroup.user .bubble{background:var(--surface2);border:1px solid var(--border2);border-right:2px solid rgba(249,115,22,0.35);color:var(--text2);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.mgroup.twin .bubble{background:var(--surface);border:1px solid var(--border2);border-left:2px solid rgba(249,115,22,0.28);color:var(--text);clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px)}
.bubble-actions{display:flex;align-items:center;gap:4px;margin-top:9px;padding-top:8px;border-top:1px solid var(--border);opacity:0;transition:opacity 0.15s}
.mgroup.twin:hover .bubble-actions{opacity:1}
.bact-btn{font-family:var(--mono);font-size:10px;padding:3px 10px;border:1px solid var(--border2);background:transparent;color:var(--muted3);cursor:pointer;transition:var(--trans);letter-spacing:0.04em;display:flex;align-items:center;gap:4px;white-space:nowrap;border-radius:var(--r)}
.bact-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.bact-btn.pin:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-d)}
.bact-btn.copy.copied{border-color:rgba(34,211,238,0.4);color:var(--cyan)}
.token-badge{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted3);letter-spacing:0.04em}
.bubble b,.bubble strong{color:var(--accent);font-weight:600}
.bubble em{color:var(--text2);font-style:italic}
.bubble ul,.bubble ol{padding-left:20px;margin:7px 0}
.bubble li{margin-bottom:3px;color:var(--text2);font-size:12.5px}
.bubble h3{font-family:var(--serif);font-size:14px;font-weight:400;color:var(--text);margin:10px 0 5px;border-bottom:1px solid var(--border);padding-bottom:4px}
.bubble code{font-family:var(--mono);font-size:11px;background:var(--accent-d);border:1px solid rgba(249,115,22,0.18);padding:1px 6px;color:var(--accent);border-radius:2px}
.vtag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.12em;padding:2px 9px;margin-bottom:8px;border-radius:100px}
.vtag::before{content:'';width:4px;height:4px;background:currentColor;opacity:0.7;border-radius:50%}
.vtag.analysis{background:rgba(34,211,238,0.07);color:var(--cyan);border:1px solid rgba(34,211,238,0.2)}
.vtag.counter{background:rgba(249,115,22,0.07);color:var(--accent);border:1px solid rgba(249,115,22,0.2)}
.vtag.proxy{background:rgba(249,115,22,0.07);color:var(--accent);border:1px solid rgba(249,115,22,0.2)}
.vtag.critique{background:var(--danger-d);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.vtag.brainstorm{background:var(--purple-d);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.vtag.websearch{background:var(--cyan-d);color:var(--cyan);border:1px solid rgba(34,211,238,0.25)}
